<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4</title>
    <style>
        .exterior {
            width: 300px;
            border: 1px solid;
        }

        .interior {
            width: 0%;
            height: 20px;
            background: green;
        }
    </style>
</head>
<body>
    <div class="exterior">
        <div class="interior" id="interior">

        </div>
    </div>
    <p id="resultado"></p>
    <button id="btn" onclick="iniciar()">Iniciar</button>
    <button id="btn2" onclick="detener()">Detener</button>
</body>
<script>
    let progreso = 0
    let intervalo = null
    const barra = document.getElementById("interior")
    const resultado = document.getElementById("resultado")
    function iniciar() {
        progreso = 0
        clearInterval(intervalo)
        intervalo = setInterval(function () {
            progreso = progreso + 1
            barra.style.width = progreso + "%"
            if (progreso >= 100) {
                clearInterval(intervalo)
                resultado.innerHTML = "¡Completado!"
            }
        }, 100)
    }
    function detener() {
        clearInterval(intervalo)
    }
</script>
</html>
